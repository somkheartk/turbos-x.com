services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartstore-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartstore-kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartstore-kafka-ui
    restart: unless-stopped
    depends_on: [kafka]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: smartstore
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  mongodb:
    image: mongo:7
    container_name: smartstore-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartstore

  pos-service:
    build:
      context: ./apps/pos-service
      dockerfile: Dockerfile
    container_name: smartstore-pos-service
    restart: unless-stopped
    depends_on: [mongodb, kafka, pos-sales-service, pos-catalog-service]
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/smartstore
      KAFKA_BROKERS: kafka:29092
      CORS_ORIGIN: "*"
      CATALOG_SERVICE_URL: http://pos-catalog-service:3003/api
      SALES_SERVICE_URL: http://pos-sales-service:3002/api

  pos-sales-service:
    build:
      context: ./apps/pos-sales-service
      dockerfile: Dockerfile
    container_name: smartstore-pos-sales-service
    restart: unless-stopped
    depends_on: [mongodb, kafka]
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/smartstore
      KAFKA_BROKERS: kafka:29092

  pos-catalog-service:
    build:
      context: ./apps/pos-catalog-service
      dockerfile: Dockerfile
    container_name: smartstore-pos-catalog-service
    restart: unless-stopped
    depends_on: [mongodb, kafka]
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://mongodb:27017/smartstore
      KAFKA_BROKERS: kafka:29092

  pos-web:
    build:
      context: ./apps/pos-web
      dockerfile: Dockerfile
    container_name: smartstore-pos-web
    restart: unless-stopped
    depends_on: [pos-service]
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      API_BASE_URL: http://pos-service:3001/api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api

volumes:
  mongo_data:
