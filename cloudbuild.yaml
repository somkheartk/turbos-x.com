steps:
  # Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartstore/$_SERVICE:$_TAG
      - -f
      - apps/$_SERVICE/Dockerfile
      - apps/$_SERVICE
    id: build

  # Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartstore/$_SERVICE:$_TAG
    id: push
    waitFor: [build]

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/smartstore/$_SERVICE:$_TAG

substitutions:
  _SERVICE: pos-service
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
