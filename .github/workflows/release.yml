name: Release to Production

# Triggered by stable tags only: v1.0.0, v1.2.3
# RC tags (v1.0.0-rc.1) are handled by uat-release.yml
on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-rc.*'

env:
  PROJECT_ID: probable-effort-445713-t1
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev/probable-effort-445713-t1/smartstore
  SERVICES: pos-web pos-service pos-catalog-service pos-sales-service

jobs:
  # ─── 1. Create GitHub Release with auto-generated notes ──────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

  # ─── 2. Promote RC image → prod (no rebuild, same digest) ────────────────────
  promote:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        service: [pos-web, pos-service, pos-catalog-service, pos-sales-service]
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Verify RC image exists
        run: |
          IMAGE="$REGISTRY/${{ matrix.service }}:${{ github.sha }}"
          if ! gcloud artifacts docker images describe "$IMAGE" --quiet 2>/dev/null; then
            echo "::error::Image $IMAGE not found."
            echo "::error::Tag ${{ github.ref_name }} must be placed on the same commit as the RC tag."
            exit 1
          fi
          echo "✓ Image verified: $IMAGE"

      - name: Promote — retag RC image as ${{ github.ref_name }}
        run: |
          gcloud artifacts docker tags add \
            "$REGISTRY/${{ matrix.service }}:${{ github.sha }}" \
            "$REGISTRY/${{ matrix.service }}:${{ github.ref_name }}"
          echo "✓ ${{ matrix.service }}:${{ github.sha }} → :${{ github.ref_name }} (same digest)"

  # ─── 3. Deploy to prod (requires approval) ───────────────────────────────────
  deploy-prod:
    needs: [create-release, promote]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy ${{ github.ref_name }} → prod
        run: |
          TRAFFIC_TAG=$(echo "${{ github.ref_name }}" | tr '.' '-' | tr '[:upper:]' '[:lower:]')

          for SERVICE in $SERVICES; do
            IMAGE="$REGISTRY/$SERVICE:${{ github.sha }}"
            ENV_VARS=$(bash scripts/cloud-run-env.sh "$SERVICE")
            SECRETS=$(bash scripts/cloud-run-secrets.sh "$SERVICE")

            echo "▶ Deploying $SERVICE..."
            gcloud run deploy "$SERVICE" \
              --image "$IMAGE" \
              --region "$REGION" \
              --platform managed \
              --allow-unauthenticated \
              --set-env-vars "$ENV_VARS" \
              --tag "$TRAFFIC_TAG" \
              ${SECRETS:+--set-secrets="$SECRETS"} \
              --project "$PROJECT_ID"
            echo "✓ $SERVICE"
          done

          echo ""
          echo "✓ ${{ github.ref_name }} deployed to production"
          echo "  Release notes: ${{ needs.create-release.outputs.release_url }}"

  # ─── 4. Merge tag → main ─────────────────────────────────────────────────────
  merge-main:
    needs: deploy-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge ${{ github.ref_name }} → main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main

          if git merge --ff-only "${{ github.sha }}"; then
            git push origin main
            echo "✓ main fast-forwarded to ${{ github.ref_name }}"
          else
            echo "::warning::Fast-forward failed — merge main manually:"
            echo "::warning::  git checkout main && git merge ${{ github.ref_name }} && git push origin main"
            exit 1
          fi
