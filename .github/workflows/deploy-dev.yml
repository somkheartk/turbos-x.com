name: Deploy to Cloud Run (Dev)

on:
  push:
    branches: [dev]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  # ─── 1. ตรวจว่า service ไหนเปลี่ยนบ้าง ───────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      pos-web:             ${{ steps.filter.outputs.pos-web }}
      pos-service:         ${{ steps.filter.outputs.pos-service }}
      pos-sales-service:   ${{ steps.filter.outputs.pos-sales-service }}
      pos-catalog-service: ${{ steps.filter.outputs.pos-catalog-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pos-web:
              - 'apps/pos-web/**'
            pos-service:
              - 'apps/pos-service/**'
            pos-sales-service:
              - 'apps/pos-sales-service/**'
            pos-catalog-service:
              - 'apps/pos-catalog-service/**'

  # ─── 2. Build + Deploy แต่ละ service (ขนานกัน) ───────────────────────────
  deploy:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: pos-web
            deploy-name: pos-web-dev
            changed: ${{ needs.changes.outputs.pos-web }}
            port: 8080
            secrets: ""
          - service: pos-service
            deploy-name: pos-service-dev
            changed: ${{ needs.changes.outputs.pos-service }}
            port: 3001
            secrets: "MONGODB_URI_POS=MONGODB_URI_POS_DEV:latest"
          - service: pos-sales-service
            deploy-name: pos-sales-service-dev
            changed: ${{ needs.changes.outputs.pos-sales-service }}
            port: 3002
            secrets: "MONGODB_URI_SALES=MONGODB_URI_SALES_DEV:latest,KAFKA_USERNAME=KAFKA_USERNAME:latest,KAFKA_PASSWORD=KAFKA_PASSWORD:latest"
          - service: pos-catalog-service
            deploy-name: pos-catalog-service-dev
            changed: ${{ needs.changes.outputs.pos-catalog-service }}
            port: 3003
            secrets: "MONGODB_URI_CATALOG=MONGODB_URI_CATALOG_DEV:latest,KAFKA_USERNAME=KAFKA_USERNAME:latest,KAFKA_PASSWORD=KAFKA_PASSWORD:latest"

    if: |
      needs.changes.outputs.pos-web == 'true' ||
      needs.changes.outputs.pos-service == 'true' ||
      needs.changes.outputs.pos-sales-service == 'true' ||
      needs.changes.outputs.pos-catalog-service == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Skip if service unchanged
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - name: Authenticate to Google Cloud
        if: matrix.changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        if: matrix.changed == 'true'
        uses: google-github-actions/setup-gcloud@v2

      # ─── Build ผ่าน Cloud Build (image tag shared, reused by both envs) ────
      - name: Build image via Cloud Build
        if: matrix.changed == 'true'
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_SERVICE=${{ matrix.service }},_TAG=dev-${{ github.sha }} \
            --timeout=20m

      # ─── Deploy to Cloud Run (dev) ────────────────────────────────────────
      - name: Deploy to Cloud Run (dev)
        if: matrix.changed == 'true'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/smartstore/${{ matrix.service }}:dev-${{ github.sha }}"
          SECRETS="${{ matrix.secrets }}"

          gcloud run deploy ${{ matrix.deploy-name }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --port=${{ matrix.port }} \
            --allow-unauthenticated \
            --set-env-vars="$(./scripts/cloud-run-env-dev.sh ${{ matrix.service }})" \
            ${SECRETS:+--set-secrets="$SECRETS"} \
            --quiet

      - name: Print service URL
        if: matrix.changed == 'true'
        run: |
          gcloud run services describe ${{ matrix.deploy-name }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
